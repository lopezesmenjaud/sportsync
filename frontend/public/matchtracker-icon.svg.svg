<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06D6A0"/>
      <stop offset="100%" stop-color="#C8F135"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado oscuro -->
  <rect width="100" height="100" rx="20" fill="#0D1B2A"/>

  <!-- Cuerpo del calendario -->
  <rect x="12" y="22" width="60" height="58" rx="8" fill="none" stroke="#00B4D8" stroke-width="2.5"/>
  <!-- Header cyan -->
  <rect x="12" y="22" width="60" height="18" rx="8" fill="#00B4D8"/>
  <rect x="12" y="33" width="60" height="7" fill="#00B4D8"/>
  <!-- Argollas -->
  <rect x="26" y="15" width="5" height="14" rx="2.5" fill="#00B4D8"/>
  <rect x="53" y="15" width="5" height="14" rx="2.5" fill="#00B4D8"/>

  <!-- Balón de fútbol pequeño -->
  <circle cx="24" cy="56" r="6" fill="none" stroke="#8899AA" stroke-width="1.5"/>
  <circle cx="24" cy="56" r="1.8" fill="#8899AA"/>

  <!-- Casco NFL activo en lima -->
  <rect x="33" y="50" width="14" height="12" rx="2.5" fill="rgba(200,241,53,0.12)" stroke="#C8F135" stroke-width="1.5"/>
  <path d="M36 60 Q36 53 42 53 Q47 53 47 57 L45.5 57 Q45.5 54.5 42 54.5 Q37.5 54.5 37.5 60 Z" fill="#C8F135"/>
  <!-- Punto activo lima -->
  <circle cx="46" cy="51" r="2.5" fill="#C8F135"/>

  <!-- Basketball naranja -->
  <circle cx="59" cy="56" r="6" fill="none" stroke="#FF5C00" stroke-width="1.5" opacity="0.85"/>
  <line x1="53" y1="56" x2="65" y2="56" stroke="#FF5C00" stroke-width="1" opacity="0.7"/>
  <path d="M56.5 50.5 Q59 53 56.5 61.5" fill="none" stroke="#FF5C00" stroke-width="1" opacity="0.6"/>
  <path d="M61.5 50.5 Q59 53 61.5 61.5" fill="none" stroke="#FF5C00" stroke-width="1" opacity="0.6"/>

  <!-- Línea de tracking -->
  <polyline points="42,56 72,56 80,46 88,50 95,36"
            fill="none" stroke="url(#lg)" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Nodo activo final -->
  <circle cx="95" cy="36" r="5" fill="#C8F135"/>
  <circle cx="95" cy="36" r="9" fill="none" stroke="#C8F135" stroke-width="1" opacity="0.3"/>
</svg>
