<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 200" width="620" height="200">
  <defs>
    <linearGradient id="limeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06D6A0"/>
      <stop offset="100%" style="stop-color:#C8F135"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4D8"/>
      <stop offset="100%" style="stop-color:#06D6A0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="620" height="200" fill="#0B1220" rx="16"/>

  <!-- === ÍCONO: Calendario con iconos de deportes === -->
  <g transform="translate(44, 38)">

    <!-- Cuerpo del calendario -->
    <rect x="0" y="10" width="80" height="80" rx="12" fill="none" stroke="#00B4D8" stroke-width="2.5"/>
    
    <!-- Header azul -->
    <rect x="0" y="10" width="80" height="22" rx="12" fill="url(#cyanGrad)" opacity="0.9"/>
    <rect x="0" y="24" width="80" height="8" rx="0" fill="url(#cyanGrad)" opacity="0.9"/>

    <!-- Argollas -->
    <rect x="20" y="3" width="6" height="16" rx="3" fill="#00B4D8"/>
    <rect x="54" y="3" width="6" height="16" rx="3" fill="#00B4D8"/>

    <!-- Fila 1 de cuadritos -->
    <!-- Cuadrito vacío -->
    <rect x="10" y="42" width="14" height="14" rx="3" fill="#0D1B2A"/>
    <!-- Cuadrito con balón de fútbol -->
    <rect x="29" y="42" width="14" height="14" rx="3" fill="#0D1B2A"/>
    <circle cx="36" cy="49" r="5" fill="none" stroke="#8899AA" stroke-width="1.2"/>
    <circle cx="36" cy="49" r="1.5" fill="#8899AA"/>
    <line x1="36" y1="44" x2="36" y2="54" stroke="#8899AA" stroke-width="0.8" opacity="0.5"/>
    <line x1="31" y1="49" x2="41" y2="49" stroke="#8899AA" stroke-width="0.8" opacity="0.5"/>

    <!-- Cuadrito con casco NFL — ACTIVO (lima) -->
    <rect x="48" y="42" width="14" height="14" rx="3" fill="#C8F135" opacity="0.15"/>
    <rect x="48" y="42" width="14" height="14" rx="3" fill="none" stroke="#C8F135" stroke-width="1.5"/>
    <!-- Casco simplificado -->
    <path d="M51 52 Q51 45 58 45 Q63 45 63 50 L61 50 Q61 47 58 47 Q53 47 53 52 Z" fill="#C8F135" opacity="0.9"/>
    <line x1="51" y1="52" x2="63" y2="52" stroke="#C8F135" stroke-width="1" opacity="0.6"/>
    <!-- Punto activo -->
    <circle cx="62" cy="44" r="3" fill="#C8F135" filter="url(#glow)"/>

    <!-- Fila 2 de cuadritos -->
    <!-- Cuadrito vacío -->
    <rect x="10" y="62" width="14" height="14" rx="3" fill="#0D1B2A"/>
    <!-- Cuadrito con pelota de basketball -->
    <rect x="29" y="62" width="14" height="14" rx="3" fill="#0D1B2A"/>
    <circle cx="36" cy="69" r="5" fill="none" stroke="#FF5C00" stroke-width="1.2" opacity="0.8"/>
    <path d="M33 64.5 Q36 67 33 73.5" fill="none" stroke="#FF5C00" stroke-width="0.8" opacity="0.6"/>
    <path d="M39 64.5 Q36 67 39 73.5" fill="none" stroke="#FF5C00" stroke-width="0.8" opacity="0.6"/>
    <line x1="31" y1="69" x2="41" y2="69" stroke="#FF5C00" stroke-width="0.8" opacity="0.6"/>

    <!-- Cuadrito vacío -->
    <rect x="48" y="62" width="14" height="14" rx="3" fill="#0D1B2A"/>

    <!-- Línea de tracking saliendo del calendario -->
    <polyline points="55,49 80,49 96,35 110,42 124,22"
              fill="none" stroke="url(#limeGrad)" stroke-width="3"
              stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Nodo activo final -->
    <circle cx="124" cy="22" r="6.5" fill="#C8F135" filter="url(#glow)"/>
    <circle cx="124" cy="22" r="12" fill="none" stroke="#C8F135" stroke-width="1" opacity="0.35"/>

  </g>

  <!-- Línea separadora vertical -->
  <line x1="208" y1="55" x2="208" y2="148" stroke="#1E3A5F" stroke-width="1.5"/>

  <!-- WORDMARK -->
  <text x="224" y="108"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="50"
        font-weight="800"
        fill="#FFFFFF"
        letter-spacing="-2">Match<tspan fill="url(#limeGrad)">Tracker</tspan></text>

  <!-- Tagline -->
  <text x="225" y="138"
        font-family="Helvetica, Arial, sans-serif"
        font-size="15"
        font-weight="400"
        fill="#8899AA"
        letter-spacing="0.4">Track every match. Catch every change.</text>

</svg>
